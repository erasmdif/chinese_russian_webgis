<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Missionary Frontier Map</title>
  <meta
    name="description"
    content="Mappa storica interattiva di province, frontiera condivisa e luoghi visitati da missionari."
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="app">
    <div id="map" aria-label="Mappa storica interattiva"></div>

    <div id="loading-overlay" class="loading-overlay is-visible" aria-live="polite">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <p>Caricamento mappa…</p>
      </div>
    </div>

    <div id="map-note" class="map-note" hidden></div>

    <aside id="info-modal" class="info-modal" aria-hidden="true">
      <div id="info-backdrop" class="info-modal__backdrop"></div>
      <div class="info-modal__panel" role="dialog" aria-modal="true" aria-labelledby="info-title">
        <button id="info-close" class="info-modal__close" type="button" aria-label="Chiudi pannello">×</button>
        <div class="info-modal__header">
          <p id="info-kicker" class="info-modal__kicker"></p>
          <h2 id="info-title" class="info-modal__title"></h2>
          <p id="info-subtitle" class="info-modal__subtitle"></p>
        </div>
        <div id="info-content" class="info-modal__content"></div>
      </div>
    </aside>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script
    src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
    crossorigin="anonymous"
  ></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
